<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI_devs 4 — Podsumowania</title>

  <!-- Fonts: Literata (body), Inter (UI), JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,300..900;1,7..72,300..900&display=swap" rel="stylesheet">

  <!-- Highlight.js -->
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>

  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>

  <!-- Mermaid (ESM, manual rendering) -->
  <script>
    // Promise that resolves once mermaid is loaded and initialized — renderSummary awaits this
    // before calling mermaid.run() so the module-script load race is safe.
    window.mermaidReady = new Promise((resolve) => { window.__resolveMermaid = resolve; });
  </script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'loose',
      fontFamily: 'JetBrains Mono, monospace',
      flowchart: { curve: 'basis', htmlLabels: true },
    });
    window.mermaid = mermaid;
    window.__resolveMermaid();
  </script>

  <style>
    /* ============================================================
       DESIGN TOKENS — dark only
       ============================================================ */
    :root {
      /* Page */
      --bg-page: #18181b;
      --bg-surface: #222225;
      --bg-code: #27272a;
      --bg-toc: #222225;
      --bg-hint: #2a2720;

      /* Text */
      --text: #d4d4cc;
      --text-secondary: #a1a19b;
      --text-heading: #ececdf;
      --text-faint: #71716c;

      /* Borders */
      --border: #3a3a3e;
      --border-light: #30302f;

      /* Accent */
      --accent: #fbbf24;
      --accent-bg: #3b3520;

      /* Links */
      --link: #60a5fa;
      --link-hover: #93bbfd;

      /* Season palette */
      --s1: #60a5fa; --s1-bg: #1e293b;
      --s2: #34d399; --s2-bg: #1a2e26;
      --s3: #fbbf24; --s3-bg: #2e2817;
      --s4: #a78bfa; --s4-bg: #25203a;
      --s5: #f87171; --s5-bg: #2e1a1a;

      /* Code syntax */
      --syn-keyword: #d2a8ff;
      --syn-string: #a5d6ff;
      --syn-comment: #8b949e;
      --syn-number: #79c0ff;
      --syn-title: #ffa657;
      --syn-attr: #7ee787;
      --syn-type: #ffa657;
      --syn-tag: #7ee787;

      /* Typography */
      --font-body: 'Literata', Georgia, 'Times New Roman', serif;
      --font-ui: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --fs: 18.5px;
      --lh: 1.74;
      --content-w: 41rem;
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      hanging-punctuation: first last;
    }

    body {
      font-family: var(--font-body);
      font-size: var(--fs);
      line-height: var(--lh);
      color: var(--text);
      background: var(--bg-page);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-optical-sizing: auto;
    }

    /* ============================================================
       PROGRESS BAR
       ============================================================ */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0;
      background: var(--accent);
      z-index: 1000;
      transition: width 80ms linear;
      pointer-events: none;
    }

    /* ============================================================
       TOP BAR
       ============================================================ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(24, 24, 27, 0.85);
      border-bottom: 1px solid var(--border-light);
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-ui);
      font-size: 0.82rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
    .topbar-left a { color: var(--text-secondary); text-decoration: none; font-weight: 500; }
    .topbar-left a:hover { color: var(--link); }

    .topbar-right { display: flex; align-items: center; gap: 0.75rem; }

    .badge-season {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.15em 0.55em;
      border-radius: 4px;
      color: #fff;
    }
    .badge-season[data-s="1"] { background: var(--s1); }
    .badge-season[data-s="2"] { background: var(--s2); }
    .badge-season[data-s="3"] { background: var(--s3); }
    .badge-season[data-s="4"] { background: var(--s4); }
    .badge-season[data-s="5"] { background: var(--s5); }

    /* ============================================================
       LAYOUT CONTAINER
       ============================================================ */
    .container {
      max-width: var(--content-w);
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ============================================================
       HOME VIEW
       ============================================================ */
    .home-header {
      text-align: center;
      padding: 3rem 0 2.5rem;
    }
    .home-header h1 {
      font-family: var(--font-ui);
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--text-heading);
      letter-spacing: -0.02em;
    }
    .home-header p {
      font-family: var(--font-ui);
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 0.4rem;
    }

    .season-group { margin-bottom: 2.5rem; }

    .season-label {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
      padding-left: 0.25rem;
    }
    .season-label[data-season="1"] { color: var(--s1); }
    .season-label[data-season="2"] { color: var(--s2); }
    .season-label[data-season="3"] { color: var(--s3); }
    .season-label[data-season="4"] { color: var(--s4); }
    .season-label[data-season="5"] { color: var(--s5); }

    .lesson-list { display: flex; flex-direction: column; gap: 0.4rem; }

    .lesson-card {
      display: flex;
      align-items: baseline;
      gap: 0.85rem;
      padding: 0.75rem 1rem;
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .lesson-card:hover {
      border-color: var(--border);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      transform: translateY(-1px);
      text-decoration: none;
      color: var(--text);
    }

    .lesson-card .ep {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-faint);
      white-space: nowrap;
      min-width: 4.5em;
    }
    .lesson-card .title {
      font-family: var(--font-ui);
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text-heading);
    }

    /* ============================================================
       SUMMARY VIEW
       ============================================================ */
    .summary-header {
      padding: 2.5rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .summary-header h1 {
      font-family: var(--font-ui);
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--text-heading);
      letter-spacing: -0.015em;
      line-height: 1.3;
      margin-top: 0.5rem;
    }

    /* ---- Table of contents ---- */
    .toc {
      background: var(--bg-toc);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 1.1rem 1.4rem;
      margin-bottom: 2.5rem;
    }
    .toc h4 {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 0.7rem;
    }
    .toc ol {
      list-style: none;
      padding: 0;
      margin: 0;
      counter-reset: toc;
    }
    .toc li {
      counter-increment: toc;
      margin-bottom: 0.25rem;
    }
    .toc li::before {
      content: counter(toc) ".";
      font-family: var(--font-mono);
      font-size: 0.72em;
      color: var(--text-faint);
      margin-right: 0.5em;
      display: inline-block;
      min-width: 1.5em;
    }
    .toc a {
      font-family: var(--font-ui);
      font-size: 0.88rem;
      color: var(--text-secondary);
      text-decoration: none;
    }
    .toc a:hover { color: var(--link); }

    /* ---- Article content ---- */
    .content h2 {
      font-family: var(--font-ui);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-heading);
      line-height: 1.3;
      margin: 3rem 0 1rem;
      padding-bottom: 0.45rem;
      border-bottom: 1px solid var(--border-light);
    }
    .content h2:first-child { margin-top: 0; }

    .content h3 {
      font-family: var(--font-ui);
      font-size: 1.08rem;
      font-weight: 600;
      color: var(--text-heading);
      line-height: 1.35;
      margin: 2.2rem 0 0.7rem;
    }

    .content h4 {
      font-family: var(--font-ui);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-heading);
      margin: 1.5rem 0 0.5rem;
    }

    .content p {
      margin-bottom: 1.15em;
      overflow-wrap: break-word;
    }

    .content strong {
      font-weight: 700;
      color: var(--text-heading);
    }

    .content em { font-style: italic; }

    .content ul, .content ol {
      padding-left: 1.4em;
      margin-bottom: 1.15em;
    }

    .content li {
      margin-bottom: 0.35em;
    }

    .content li > ul, .content li > ol {
      margin-top: 0.35em;
      margin-bottom: 0.35em;
    }

    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    /* ---- Inline code ---- */
    .content code {
      font-family: var(--font-mono);
      font-size: 0.82em;
      background: var(--bg-code);
      padding: 0.12em 0.35em;
      border-radius: 4px;
      word-break: break-word;
    }

    /* ---- Code blocks ---- */
    .content pre {
      background: var(--bg-code);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 1.15rem 2.5rem;
      margin: 1.6em -4rem;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .content pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      font-size: 0.82em;
      line-height: 1.6;
      word-break: normal;
    }

    /* ---- Mermaid diagrams ---- */
    .content pre.mermaid {
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 1.5rem 1rem;
      margin: 1.8em -2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 0.85em;
      line-height: 1.4;
    }
    /* Pre-render state: show raw source so user sees "something" during the brief render */
    .content pre.mermaid:not([data-processed]) {
      white-space: pre;
      color: var(--text-faint);
      justify-content: flex-start;
    }
    .content pre.mermaid svg {
      max-width: 100%;
      height: auto;
    }

    /* ---- Blockquotes ---- */
    .content blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.7em 1.2em;
      margin: 1.5em 0;
      background: var(--bg-surface);
      border-radius: 0 6px 6px 0;
      color: var(--text-secondary);
    }
    .content blockquote p:last-child { margin-bottom: 0; }

    /* ---- Tables ---- */
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5em 0;
      font-size: 0.9em;
    }
    .content th, .content td {
      border: 1px solid var(--border);
      padding: 0.5em 0.75em;
      text-align: left;
    }
    .content th {
      background: var(--bg-toc);
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.88em;
    }

    /* ---- Links in content ---- */
    .content a { color: var(--link); text-decoration: none; }
    .content a:hover { color: var(--link-hover); text-decoration: underline; }

    /* ============================================================
       HINTS (spoiler for "Wskazówka")
       ============================================================ */
    .hint {
      display: block;
      margin-top: 0.5em;
    }
    .hint-btn {
      font-family: var(--font-ui);
      font-size: 0.82rem;
      background: var(--bg-hint);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3em 0.8em;
      cursor: pointer;
      color: var(--text-secondary);
      transition: background 0.15s;
    }
    .hint-btn:hover { background: var(--accent-bg); }
    .hint-text {
      display: none;
      margin-top: 0.5em;
      padding: 0.6em 1em;
      background: var(--bg-hint);
      border-radius: 6px;
      font-size: 0.92em;
      color: var(--text-secondary);
      border-left: 3px solid var(--accent);
    }
    .hint.open .hint-btn { background: var(--accent-bg); }
    .hint.open .hint-text { display: block; }

    /* ============================================================
       PREV / NEXT NAVIGATION
       ============================================================ */
    .pager {
      display: flex;
      gap: 1rem;
      margin-top: 3.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .pager a {
      flex: 1;
      display: block;
      padding: 1rem 1.1rem;
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      text-decoration: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .pager a:hover {
      border-color: var(--border);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      text-decoration: none;
    }
    .pager a[hidden] { display: none; }
    .pager .dir {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 0.3rem;
    }
    .pager .pg-title {
      font-family: var(--font-ui);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-heading);
    }
    .pager .next-pager { text-align: right; }

    /* ============================================================
       HIGHLIGHT.JS SYNTAX COLORS
       ============================================================ */
    .hljs { background: transparent; color: var(--text); }
    .hljs-keyword, .hljs-selector-tag, .hljs-built_in, .hljs-literal { color: var(--syn-keyword); }
    .hljs-string, .hljs-doctag, .hljs-template-tag, .hljs-template-variable { color: var(--syn-string); }
    .hljs-comment, .hljs-quote { color: var(--syn-comment); font-style: italic; }
    .hljs-number { color: var(--syn-number); }
    .hljs-title, .hljs-section, .hljs-title.function_ { color: var(--syn-title); }
    .hljs-attr, .hljs-attribute { color: var(--syn-attr); }
    .hljs-type, .hljs-title.class_ { color: var(--syn-type); }
    .hljs-name, .hljs-tag { color: var(--syn-tag); }
    .hljs-variable { color: var(--text); }
    .hljs-params { color: var(--text); }
    .hljs-meta { color: var(--syn-keyword); }
    .hljs-property { color: var(--syn-number); }
    .hljs-punctuation { color: var(--text-secondary); }
    .hljs-addition { color: #7ee787; background: rgba(46, 160, 67, 0.15); }
    .hljs-deletion { color: #ffa198; background: rgba(248, 81, 73, 0.15); }

    /* ============================================================
       KEYBOARD SHORTCUT HINT
       ============================================================ */
    .keys-hint {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      color: var(--text-faint);
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }
    .keys-hint kbd {
      font-family: var(--font-mono);
      background: var(--bg-toc);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1em 0.4em;
      font-size: 0.9em;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 50rem) {
      .content pre {
        margin-left: -1.5rem;
        margin-right: -1.5rem;
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
      .content pre.mermaid {
        margin-left: -1rem;
        margin-right: -1rem;
      }
    }

    @media (max-width: 640px) {
      :root { --fs: 17px; }
      .container { padding: 1.2rem 1rem 3rem; }
      .home-header { padding: 2rem 0 1.5rem; }
      .home-header h1 { font-size: 1.5rem; }
      .summary-header h1 { font-size: 1.35rem; }
      .content h2 { font-size: 1.15rem; }
      .content h3 { font-size: 1rem; }
      .content pre {
        margin-left: -1rem;
        margin-right: -1rem;
        padding-left: 1rem;
        padding-right: 1rem;
        border-radius: 0;
      }
      .content pre.mermaid {
        margin-left: -1rem;
        margin-right: -1rem;
        border-radius: 0;
      }
      .pager { flex-direction: column; }
      .pager .next-pager { text-align: left; }
    }

    /* ============================================================
       VIEW VISIBILITY
       ============================================================ */
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <!-- Reading progress -->
  <div id="progress-bar"></div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="#/" id="topbar-home">AI_devs 4</a>
      <span id="topbar-badge"></span>
    </div>
    <div class="topbar-right"></div>
  </div>

  <!-- ==================== HOME VIEW ==================== -->
  <div id="home-view">
    <div class="container">
      <div class="home-header">
        <h1>Podsumowania lekcji</h1>
        <p>AI_devs 4 — nauka i powtórki</p>
      </div>
      <div id="lesson-list"></div>
    </div>
  </div>

  <!-- ==================== SUMMARY VIEW ==================== -->
  <div id="summary-view" hidden>
    <div class="container">
      <div class="summary-header">
        <span id="summary-badge" class="badge-season"></span>
        <h1 id="summary-title"></h1>
      </div>

      <div id="toc-container"></div>

      <div id="content" class="content"></div>

      <div class="pager">
        <a id="prev-link" href="#/" hidden>
          <div class="dir">← Poprzednia</div>
          <div class="pg-title" id="prev-title"></div>
        </a>
        <a id="next-link" href="#/" class="next-pager" hidden>
          <div class="dir">Następna →</div>
          <div class="pg-title" id="next-title"></div>
        </a>
      </div>

      <div class="keys-hint">
        <kbd>←</kbd> <kbd>→</kbd> nawigacja &nbsp;&middot;&nbsp; <kbd>Esc</kbd> lista lekcji
      </div>
    </div>
  </div>

  <script>
    /* ==========================================================
       STATE
       ========================================================== */
    let summaries = [];
    let currentIdx = -1;

    /* ==========================================================
       MARKDOWN RENDERING
       ========================================================== */
    function slugify(text) {
      return text
        .replace(/<[^>]+>/g, '')
        .trim()
        .toLowerCase()
        .replace(/[^\w\sąćęłńóśźżäöü-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    function renderMarkdown(md) {
      // Remove H1 title (rendered separately)
      md = md.replace(/^#\s+.+\n+/, '');

      // Render with marked
      let html = marked.parse(md);

      // Convert mermaid code blocks to <pre class="mermaid"> so mermaid.run() can find them.
      // Marked escapes HTML inside code, but the browser decodes those entities when parsing
      // innerHTML, so mermaid reads the original characters via textContent — no decoding needed.
      html = html.replace(
        /<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g,
        '<pre class="mermaid">$1</pre>'
      );

      // Add IDs to h2, h3 for TOC linking
      html = html.replace(/<h([23])>([\s\S]*?)<\/h\1>/g, (_, lvl, inner) => {
        const id = slugify(inner);
        return `<h${lvl} id="${id}">${inner}</h${lvl}>`;
      });

      // Convert *Wskazówka:...* to reveal-on-click spoilers
      html = html.replace(
        /<em>Wskazówka:([\s\S]*?)<\/em>/g,
        '<span class="hint"><button class="hint-btn" onclick="this.parentElement.classList.toggle(\'open\')">💡 Pokaż wskazówkę</button><span class="hint-text">$1</span></span>'
      );

      return html;
    }

    function extractToc(html) {
      const toc = [];
      const re = /<h2 id="([^"]*)">([\s\S]*?)<\/h2>/g;
      let m;
      while ((m = re.exec(html))) {
        toc.push({ id: m[1], text: m[2].replace(/<[^>]+>/g, '') });
      }
      return toc;
    }

    /* ==========================================================
       HOME VIEW
       ========================================================== */
    function renderHome() {
      document.getElementById('home-view').hidden = false;
      document.getElementById('summary-view').hidden = true;
      document.getElementById('progress-bar').style.width = '0';
      document.getElementById('topbar-badge').innerHTML = '';
      document.title = 'AI_devs 4 — Podsumowania';

      const grouped = {};
      for (const s of summaries) {
        (grouped[s.season] ||= []).push(s);
      }

      let html = '';

      for (const [season, lessons] of Object.entries(grouped)) {
        html += `<div class="season-group">
          <div class="season-label" data-season="${season}">Sezon ${season}</div>
          <div class="lesson-list">`;
        for (const l of lessons) {
          const ep = `S${String(l.season).padStart(2,'0')}E${String(l.episode).padStart(2,'0')}`;
          html += `<a class="lesson-card" data-file="${l.file}" href="#/s/${encodeURIComponent(l.file)}">
            <span class="ep">${ep}</span>
            <span class="title">${l.title}</span>
          </a>`;
        }
        html += `</div></div>`;
      }

      document.getElementById('lesson-list').innerHTML = html;

      // Scroll to the last-viewed lesson card (if any), otherwise to top.
      // Without this, returning from a summary leaves the window scrolled
      // wherever the user was reading — disorienting when the layout changes.
      if (currentIdx >= 0 && currentIdx < summaries.length) {
        const lastFile = summaries[currentIdx].file;
        const card = document.querySelector(`.lesson-card[data-file="${CSS.escape(lastFile)}"]`);
        if (card) {
          card.scrollIntoView({ block: 'center', behavior: 'auto' });
          return;
        }
      }
      window.scrollTo(0, 0);
    }

    /* ==========================================================
       SUMMARY VIEW
       ========================================================== */

    async function renderSummary(filename) {
      document.getElementById('home-view').hidden = true;
      document.getElementById('summary-view').hidden = false;
      window.scrollTo(0, 0);

      // Show loading state
      document.getElementById('content').innerHTML = '<p style="color:var(--text-faint)">Ładowanie...</p>';

      // Find index for nav — also needed to know the source before fetching.
      currentIdx = summaries.findIndex(s => s.file === filename);
      const info = summaries[currentIdx];
      if (!info) { window.location.hash = '#/'; return; }

      const res = await fetch(`/api/md/summaries/${encodeURIComponent(filename)}`);
      if (!res.ok) { window.location.hash = '#/'; return; }
      const md = await res.text();

      // Title
      const h1 = md.split('\n')[0].replace(/^#\s*/, '').replace(/\s*—\s*Podsumowanie$/, '');
      const ep = `S${String(info.season).padStart(2,'0')}E${String(info.episode).padStart(2,'0')}`;
      const badgeKey = String(info.season);

      document.getElementById('summary-badge').textContent = ep;
      document.getElementById('summary-badge').dataset.s = badgeKey;
      document.getElementById('summary-title').textContent = h1;
      document.title = `${ep} ${h1} — AI_devs 4`;

      // Topbar badge
      document.getElementById('topbar-badge').innerHTML =
        `<span class="badge-season" data-s="${badgeKey}">${ep}</span>`;

      // Render content
      const html = renderMarkdown(md);
      document.getElementById('content').innerHTML = html;

      // TOC
      const toc = extractToc(html);
      if (toc.length > 1) {
        let tocHtml = '<nav class="toc"><h4>Spis treści</h4><ol>';
        for (const t of toc) {
          tocHtml += `<li><a href="#${t.id}">${t.text}</a></li>`;
        }
        tocHtml += '</ol></nav>';
        document.getElementById('toc-container').innerHTML = tocHtml;
      } else {
        document.getElementById('toc-container').innerHTML = '';
      }

      // Prev / next
      const prev = currentIdx > 0 ? summaries[currentIdx - 1] : null;
      const next = currentIdx < summaries.length - 1 ? summaries[currentIdx + 1] : null;

      const prevEl = document.getElementById('prev-link');
      const nextEl = document.getElementById('next-link');

      prevEl.hidden = !prev;
      nextEl.hidden = !next;
      if (prev) {
        prevEl.href = `#/s/${encodeURIComponent(prev.file)}`;
        document.getElementById('prev-title').textContent = prev.title;
      }
      if (next) {
        nextEl.href = `#/s/${encodeURIComponent(next.file)}`;
        document.getElementById('next-title').textContent = next.title;
      }

      // Syntax highlighting for non-mermaid code blocks
      document.querySelectorAll('#content pre code').forEach(el => {
        hljs.highlightElement(el);
      });

      // Render mermaid diagrams — wait for module to load, then run.
      // suppressErrors keeps the page alive if a diagram has a syntax typo.
      await window.mermaidReady;
      try {
        await window.mermaid.run({
          querySelector: '#content pre.mermaid',
          suppressErrors: true,
        });
      } catch (e) {
        console.warn('Mermaid render error:', e);
      }
    }

    /* ==========================================================
       ROUTER
       ========================================================== */
    function handleRoute() {
      const hash = decodeURIComponent(window.location.hash || '#/');

      if (hash.startsWith('#/s/')) {
        const file = hash.slice(4);
        renderSummary(file);
      } else {
        renderHome();
      }
    }

    window.addEventListener('hashchange', handleRoute);

    /* ==========================================================
       READING PROGRESS
       ========================================================== */
    window.addEventListener('scroll', () => {
      if (document.getElementById('summary-view').hidden) return;
      const el = document.getElementById('content');
      if (!el || !el.offsetHeight) return;
      const scrolled = window.scrollY;
      const total = el.offsetHeight + el.offsetTop - window.innerHeight;
      const pct = total > 0 ? Math.min(100, Math.max(0, (scrolled / total) * 100)) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
    }, { passive: true });

    /* ==========================================================
       KEYBOARD NAVIGATION
       ========================================================== */
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('summary-view').hidden) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      if (e.key === 'ArrowLeft' && currentIdx > 0) {
        window.location.hash = `#/s/${encodeURIComponent(summaries[currentIdx - 1].file)}`;
      } else if (e.key === 'ArrowRight' && currentIdx < summaries.length - 1) {
        window.location.hash = `#/s/${encodeURIComponent(summaries[currentIdx + 1].file)}`;
      } else if (e.key === 'Escape') {
        window.location.hash = '#/';
      }
    });

    /* ==========================================================
       INIT
       ========================================================== */
    (async () => {
      const res = await fetch('/api/list');
      summaries = await res.json();
      handleRoute();
    })();
  </script>
</body>
</html>
